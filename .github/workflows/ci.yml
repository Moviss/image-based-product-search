name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version-file: '.nvmrc'
        cache: 'npm'

    - name: Install dependencies
      run: npm install --no-package-lock

    - name: Run ESLint
      run: npm run lint

    - name: Type Check
      run: npx tsc --noEmit

    - name: Run Unit Tests
      run: npm run test -- --run

    - name: Verify Build
      run: npm run build
      env:
        MONGODB_URI: mongodb://localhost:27017/dummy_build_db
